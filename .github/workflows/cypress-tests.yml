name: Cypress Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Select test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - pl
          - en

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine test spec
        id: spec
        run: |
          if [ "${{ github.event.inputs.test_suite }}" = "pl" ]; then
            echo "spec=cypress/e2e/dcg-homepage.cy.js" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_suite }}" = "en" ]; then
            echo "spec=cypress/e2e/dcg-homepage-en.cy.js" >> $GITHUB_OUTPUT
          else
            echo "spec=cypress/e2e/*.cy.js" >> $GITHUB_OUTPUT
          fi

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: firefox
          spec: ${{ steps.spec.outputs.spec }}
        env:
          # Add any environment variables if needed
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL || 'https://dcg.pl' }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 3
